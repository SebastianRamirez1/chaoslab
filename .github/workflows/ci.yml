name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Checkstyle (lint)
        run: mvn -B -ntp checkstyle:check
      - name: Compile (typecheck)
        run: mvn -B -ntp compile

  test:
    name: Test + Quality gates
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify (tests + SpotBugs + JaCoCo gate)
        run: mvn -B -ntp verify
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  # La SCA (OWASP Dependency-Check) vive en su propio workflow nocturno (security.yml):
  # la descarga de la NVD es lenta/rate-limited y no debe bloquear el camino crítico del CI.
