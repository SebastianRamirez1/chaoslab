name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Checkstyle (lint)
        run: mvn -B -ntp checkstyle:check
      - name: Compile (typecheck)
        run: mvn -B -ntp compile

  test:
    name: Test + Quality gates
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify (tests + SpotBugs + JaCoCo gate)
        run: mvn -B -ntp verify
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  security:
    name: Security (SCA)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    # SCA de dependencias (§5.5). Gate DURO: bloquea si hay CVSS >= 7 no justificada en el
    # archivo de supresiones VEX (config/owasp/dependency-check-suppressions.xml). Usa el
    # secret NVD_API_KEY para consultar la NVD (§3.1, §5.8).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # Cachea la base NVD entre corridas: la primera la puebla (lenta), las siguientes
      # solo descargan el delta (segundos). La clave rota por run para guardar el delta.
      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: dependency-check-data-${{ github.run_id }}
          restore-keys: |
            dependency-check-data-
      - name: OWASP Dependency-Check
        run: mvn -B -ntp -Psecurity verify -DnvdApiKey=${{ secrets.NVD_API_KEY }}
