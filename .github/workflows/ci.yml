name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Checkstyle (lint)
        run: mvn -B -ntp checkstyle:check
      - name: Compile (typecheck)
        run: mvn -B -ntp compile

  test:
    name: Test + Quality gates
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify (tests + SpotBugs + JaCoCo gate)
        run: mvn -B -ntp verify
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  security:
    name: Security (SCA)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    # SCA de dependencias (§5.5). Para ser fiable/rápido necesita el secret NVD_API_KEY.
    # Mientras no esté configurado, no bloquea el pipeline. Quitar continue-on-error
    # cuando el secret esté disponible para convertirlo en gate duro (§3.1, §5.8).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: OWASP Dependency-Check
        run: mvn -B -ntp -Psecurity verify -DnvdApiKey=${{ secrets.NVD_API_KEY }}
