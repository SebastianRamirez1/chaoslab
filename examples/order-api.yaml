# Topología de ejemplo — API de pedidos.
# Contrato de entrada de ChaosLab (Fase 1). Las aristas se definen SOLO en 'connections';
# un LoadBalancer reparte entre sus destinos en round-robin, el resto reenvía a todos los suyos.
name: "API de pedidos"
seed: 42                      # reproducibilidad -> Fiabilidad (mismo seed = mismo resultado)

components:
  - id: gateway
    type: LoadBalancer

  - id: api-1
    type: Service
    capacity: 100
    base_latency_ms: 50

  - id: api-2
    type: Service
    capacity: 100
    base_latency_ms: 50

  - id: orders-queue
    type: Queue
    max_size: 1000

  - id: orders-db
    type: Database
    max_connections: 50
    read_latency_ms: 20

connections:
  - { from: gateway, to: [api-1, api-2] }
  - { from: api-1, to: orders-queue }
  - { from: api-2, to: orders-queue }
  - { from: orders-queue, to: orders-db }

workload:
  requests_per_second: 200
  duration_seconds: 60
